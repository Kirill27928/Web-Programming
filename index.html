<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moon River</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="page main">
    <div class="top-dark"></div>
    <a class="logo" href="index.html" aria-label="Moon River"><img src="./assets/logo.svg" alt="Moon River" /></a>
    <div class="icons">
      <img class="header-icon" src="./assets/heart.png" alt="Избранное" />
      <img class="header-icon" src="./assets/human.png" alt="Профиль" />
      <div class="bag-wrap"><img class="header-icon" src="./assets/shop.png" alt="Корзина" /><span class="bag-count">1</span></div>
      <div class="hamburger"><span></span></div>
    </div>

    <div class="hero-title">HIGH JEWELRY</div>
    <div class="hero-cta">Смотреть коллекцию</div>
    <div class="hero-line"></div>
    <div class="hero-ring"></div>

    <div class="lang-switch"><span>RU</span> <span>EN</span></div>

    <div class="product-feature">
      <div class="name">КОЛЬЦО TRINITY, Cartier</div>
      <div class="meta">Белое золото, бриллианты</div>
      <div class="price">498 000 ₽</div>
    </div>
  </body>
</html>
